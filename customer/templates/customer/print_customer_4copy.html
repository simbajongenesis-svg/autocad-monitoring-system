<!DOCTYPE html>
<html>
    <head>
        <title>Print Customer (Quarter Page)</title>

        <style>
            @media print {
                .no-print { display: none; }

                @page {
                    size: A4 landscape;
                    margin: 5mm;
                }

                body {
                    margin: 0;
                    padding: 0;
                    font-size: 12pt;
                    line-height: 1.3;
                }
            }

            body {
                font-family: Arial, sans-serif;
                margin: 0;
            }

            /* ✅ 4 equal boxes inside A4 landscape */
            .quarter-wrapper {
                display: flex;
                flex-wrap: wrap;
                width: 100%;
                height: 100%;
            }

            .quarter-box {
                width: 50%;                /* 2 per row */
                height: 50vh;              /* EXACTLY 1/2 height of screen = 1/4 page */
                box-sizing: border-box;
                padding: 6mm;
                display: flex;
                flex-direction: column;
                justify-content: center;
                page-break-inside: avoid;
                border: 1px solid #fff;    /* 🔥 remove if you don’t want the border */
            }

            table {
                width: 100%;
                border-collapse: collapse;
                margin-bottom: 4mm;
            }

            td {
                padding: 4px 0;
                vertical-align: top;
            }

            .label {
                font-weight: bold;
                width: 35%;
                text-align: right;
                padding-right: 10px;
            }

            .value,
            .subvalue {
                font-weight: bold;
                text-transform: uppercase;
            }

            .button {
                background-color: #04AA60;
                border: none;
                color: white;
                padding: 14px 28px;
                font-size: 20px;
                cursor: pointer;
            }

            .btn1 {
                background-color: white;
                color: black;
                border: 2px solid #04AA60;
            }

            .btn1:hover {
                background-color: #04AA60;
                color: white;
            }
        </style>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    </head>

    <body>

        <div class="quarter-wrapper">

            {% for i in "1234" %}
            <div class="quarter-box">
                <table>
                    <tr>
                        <td class="label">CUSTOMER:</td>
                        <td class="value">{{ customer.fullname_or_companyname }}</td>
                    </tr>
                    <tr>
                        <td class="label">ADDRESS:</td>
                        <td class="subvalue">{{ customer.address }}</td>
                    </tr>
                    <tr>
                        <td class="label">CONTACT #:</td>
                        <td class="subvalue">{{ customer.contact_number }}</td>
                    </tr>
                </table>

                <table>
                    <tr>
                        <td class="label">FROM:</td>
                        <td class="value">{{ sender.company_name }}</td>
                    </tr>
                    <tr>
                        <td class="label">ADDRESS:</td>
                        <td class="subvalue">{{ sender.address }}</td>
                    </tr>
                    <tr>
                        <td class="label">CONTACT #:</td>
                        <td class="subvalue">{{ sender.contact_number }}</td>
                    </tr>
                </table>
            </div>
            {% endfor %}

        </div>

        <!-- PRINT BUTTON -->
        <div class="no-print" style="text-align:center; margin-top:20px;">
            <button class="btn btn-outline-success btn-lg" onclick="window.print()"><i class="fa fa-print"></i> Print</button>
        </div>

        <script>
            window.onload = function() {
                setTimeout(() => window.print(), 500);
            };
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    </body>
</html>
