<!DOCTYPE html>
<html>
    <head>
        <title>Print Customer – Landscape</title>

        <style>
            @media print {
                .no-print { display: none; }

                @page {
                    size: A4 landscape;
                    margin: .5mm;
                }

                body {
                    margin: 0;
                    padding: 0;
                    font-size: 18pt;
                    line-height: 1.5;
                }
            }

            body {
                font-family: Arial, sans-serif;
                width: 100%;
                margin: 0;
            }

            .wrapper {
                width: 100%;
                height: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 15mm;
                box-sizing: border-box;
            }

            table {
                width: 100%;
                border-collapse: collapse;
            }

            td {
                padding: 10px 0; /* ✅ Balanced row spacing after deletion */
                vertical-align: top;
            }

            .label {
                font-weight: bold;
                width: 25%;
                font-size: 20pt;
                text-align: right;
                padding-right: 14px;
            }

            .value,
            .subvalue {
                font-size: 23pt;
                font-weight: bold;
                text-transform: uppercase;
            }
        </style>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    </head>

    <body>

        <div class="wrapper">

            <div style="width: 90%;">

                <!-- ✅ TOP SECTION (without NAME row) -->
                <table>
                    <tr>
                        <td class="label">CUSTOMER:</td>
                        <td class="value">{{ customer.fullname_or_companyname }}</td>
                    </tr>

                    <tr>
                        <td class="label">ADDRESS:</td>
                        <td class="subvalue">{{ customer.address }}</td>
                    </tr>

                    <tr>
                        <td class="label">CONTACT #:</td>
                        <td class="subvalue">{{ customer.contact_number }}</td>
                    </tr>
                </table>

                <!-- ✅ FROM SECTION -->
                <table style="margin-top: 18mm;">
                    <tr>
                        <td class="label">FROM:</td>
                        <td class="value">{{ sender.company_name }}</td>
                    </tr>

                    <tr>
                        <td class="label">ADDRESS:</td>
                        <td class="subvalue">{{ sender.address }}</td>
                    </tr>

                    <tr>
                        <td class="label">CONTACT #:</td>
                        <td class="subvalue">{{ sender.contact_number }}</td>
                    </tr>
                </table>

            </div>

        </div>

        <div class="no-print" style="text-align:center; margin-top:20px;">
            <button onclick="window.print()" style="padding:14px 28px; font-size:20px;" class="btn btn-outline-success btn-lg">
                <i class="fa fa-print"></i> Pislita ni para maka-print ka!
            </button>
        </div>

        <script>
            window.onload = function() {
                setTimeout(() => window.print(), 500);
            };
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    </body>
</html>
