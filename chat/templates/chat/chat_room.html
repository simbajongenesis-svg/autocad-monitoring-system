<!DOCTYPE html>
<html>
<head>
    <title>Chat Room</title>
    <style>
        #chat-log { height: 300px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; }
        #chat-message-input { width: 80%; }
        #chat-message-submit { width: 18%; }
    </style>
</head>
<body>
    <h2>Room: {{ room_name }}</h2>
    <div id="chat-log"></div>
    <input id="chat-message-input" type="text" placeholder="Type a message...">
    <button id="chat-message-submit">Send</button>

    <script>
        const roomName = "{{ room_name }}";
        const chatSocket = new WebSocket(
            'ws://' + window.location.host +
            '/ws/chat/' + roomName + '/'
        );

        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            const chatLog = document.getElementById('chat-log');
            chatLog.innerHTML += '<b>' + data.sender + ':</b> ' + data.message + '<br>';
            chatLog.scrollTop = chatLog.scrollHeight;
        };

        chatSocket.onclose = function(e) {
            console.error('Chat socket closed unexpectedly');
        };

        document.getElementById('chat-message-submit').onclick = function() {
            const input = document.getElementById('chat-message-input');
            chatSocket.send(JSON.stringify({'message': input.value}));
            input.value = '';
        };

        document.getElementById('chat-message-input').onkeyup = function(e) {
            if (e.key === 'Enter') document.getElementById('chat-message-submit').click();
        };
    </script>
</body>
</html>
